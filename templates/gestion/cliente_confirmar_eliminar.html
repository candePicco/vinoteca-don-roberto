{% extends 'base.html' %}

{% block title %}Eliminar Cliente{% endblock %}

{% block body %}

<h1>Eliminar Cliente</h1>

<p>

¿Seguro que querés eliminar a

<strong>
{{ cliente.nombre }} {{ cliente.apellido }}
</strong>

?

</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Sí, eliminar
    </button>

</form>

<br>

<a href="{% url 'cliente_listar' %}">
    Cancelar
</a>

{% endblock %}
