{% extends 'base.html' %}

{% block title %}Registro{% endblock %}

{% block body %}

<h1>Registro de Usuario</h1>

<form method="post">

    {% csrf_token %}

    {{ form.errors }}

    {{ form.as_p }}

    <button type="submit">
        Registrarse
    </button>

</form>

<p>
    ¿Ya tenés cuenta?
    <a href="{% url 'login' %}">
        Iniciar sesión
    </a>
</p>

{% endblock %}
