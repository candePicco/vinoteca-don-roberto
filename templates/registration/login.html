{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block body %}

<h1>Iniciar Sesión</h1>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Ingresar
    </button>

</form>

<p>
    ¿No tenés cuenta?
    <a href="{% url 'registro' %}">
        Registrarse
    </a>
</p>

{% endblock %}
